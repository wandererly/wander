spring.application.name=wander

# MySQL 数据源配置
spring.datasource.url=jdbc:mysql://localhost:3306/wander?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=041029
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA 配置（生产建议 validate）
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway
spring.flyway.enabled=true

# H2 -> MySQL 迁移（仅首次启动执行）
app.migration.h2.enabled=true

# Swagger 访问路径: /swagger-ui/index.html

# Spring Security 默认用户关闭
spring.security.user.name=
spring.security.user.password=

# 日志简单配置
logging.level.org.springframework.security=INFO
