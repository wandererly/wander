<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>通知中心 | 学习平台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <header class="hero mini">
      <div class="hero-left">
        <p class="eyebrow">学习平台 · 学生端</p>
        <h1>通知中心</h1>
        <p class="sub">查看最新通知并标记已读。</p>
      </div>
      <div class="hero-actions">
        <a class="btn ghost" href="/student.html">返回主页</a>
        <span id="student-user" class="muted">-</span>
        <button id="btn-logout" class="btn ghost">退出</button>
        <a class="btn ghost" href="/login.html">返回登录</a>
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <div class="card-head">
          <h2>通知列表</h2>
          <div class="inline">
            <span id="notify-count" class="muted">未读 0</span>
            <button id="btn-refresh-notify" class="btn ghost">刷新</button>
          </div>
        </div>
        <div id="notify-list" class="grid"></div>
      </section>
    </main>

    <script src="/common.js"></script>
    <script src="/student.js"></script>
  </body>
</html>
