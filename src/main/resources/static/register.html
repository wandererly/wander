<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>注册 | 学习平台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <header class="hero single">
      <div class="hero-left">
        <h1>注册账号</h1>
        <p class="sub">创建账号后请登录进入系统。</p>
      </div>
      <div class="hero-right">
        <div class="card auth-card">
          <div class="card-head">
            <h2>注册</h2>
            <a class="muted" href="/login.html">返回登录</a>
          </div>
          <label>
            注册类型
            <select id="reg-role">
              <option value="STUDENT">学生</option>
              <option value="TEACHER">教师</option>
            </select>
          </label>
          <label>
            用户名
            <input id="reg-username" type="text" placeholder="建议 4-16 位" />
          </label>
          <label>
            邮箱
            <input id="reg-email" type="email" placeholder="name@qq.com" />
          </label>
          <label>
            密码
            <input id="reg-password" type="password" placeholder="至少 6 位" />
          </label>
          <button id="btn-register" class="btn primary full">创建账号</button>
          <p id="reg-message" class="message"></p>
          <a class="muted tiny" href="/index.html">返回首页</a>
        </div>
      </div>
    </header>
    <script src="/common.js"></script>
    <script src="/register.js"></script>
  </body>
</html>
