<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>我的课程 | 学习平台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <header class="hero mini">
      <div class="hero-left">
        <p class="eyebrow">学习平台 · 教师端</p>
        <h1>我的课程</h1>
        <p class="sub">查看你发布的课程，点击“去管理”可直接编辑。</p>
      </div>
      <div class="hero-actions">
        <a class="btn ghost" href="/teacher.html">返回主页</a>
        <span id="teacher-user" class="muted">-</span>
        <button id="btn-logout" class="btn ghost">退出</button>
        <a class="btn ghost" href="/login.html">返回登录</a>
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <div class="card-head">
          <h2>我的课程列表</h2>
          <div class="inline">
            <input id="teacher-search-keyword" type="text" placeholder="搜索课程" />
            <select id="teacher-filter-status">
              <option value="">全部状态</option>
              <option value="PUBLISHED">已发布</option>
              <option value="DRAFT">草稿</option>
              <option value="OFFLINE">已下架</option>
            </select>
            <button id="btn-teacher-search" class="btn ghost">搜索</button>
          </div>
        </div>
        <p class="muted tiny">提示：点击课程卡片里的“去管理/预览”可直达对应操作。</p>
        <div id="course-list" class="grid"></div>
        <div class="inline pager">
          <button id="btn-teacher-prev" class="btn ghost">上一页</button>
          <span id="teacher-page-info" class="muted">1 / 1</span>
          <button id="btn-teacher-next" class="btn ghost">下一页</button>
        </div>
      </section>
    </main>

    <script src="/common.js"></script>
    <script src="/teacher.js"></script>
  </body>
</html>
