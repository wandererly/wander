<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>用户详情 | 学习平台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <header class="hero mini">
      <div class="hero-left">
        <p class="eyebrow">学习平台 · 管理员端</p>
        <h1>用户详情</h1>
        <p class="sub">查看用户课程与学习进度概览。</p>
      </div>
      <div class="hero-actions">
        <a class="btn ghost" href="/admin.html">返回主页</a>
        <span id="admin-user" class="muted">-</span>
        <button id="btn-logout" class="btn ghost">退出</button>
        <a class="btn ghost" href="/login.html">返回登录</a>
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <div class="card-head">
          <h2>用户详情</h2>
          <div class="inline">
            <input id="detail-user-id" type="number" placeholder="用户 ID" />
            <button id="btn-user-detail" class="btn ghost">查看详情</button>
          </div>
        </div>
        <div id="user-detail" class="grid"></div>
      </section>
    </main>

    <script src="/common.js"></script>
    <script src="/admin.js"></script>
  </body>
</html>
