<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>角色申请 | 学习平台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <header class="hero mini">
      <div class="hero-left">
        <p class="eyebrow">学习平台 · 教师端</p>
        <h1>角色申请</h1>
        <p class="sub">如需变更为学生，可提交申请。</p>
      </div>
      <div class="hero-actions">
        <a class="btn ghost" href="/teacher.html">返回主页</a>
        <span id="teacher-user" class="muted">-</span>
        <button id="btn-logout" class="btn ghost">退出</button>
        <a class="btn ghost" href="/login.html">返回登录</a>
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <div class="card-head">
          <h2>提交申请</h2>
          <p class="muted">管理员审批后会通知你</p>
        </div>
        <label>
          申请角色
          <select id="role-request-target">
            <option value="STUDENT">学生</option>
          </select>
        </label>
        <label>
          申请理由
          <input id="role-request-reason" type="text" placeholder="简要说明" />
        </label>
        <button id="btn-role-request" class="btn ghost">提交申请</button>
        <p id="role-request-message" class="message"></p>
        <div id="role-request-list" class="grid"></div>
      </section>
    </main>

    <script src="/common.js"></script>
    <script src="/teacher.js"></script>
  </body>
</html>
