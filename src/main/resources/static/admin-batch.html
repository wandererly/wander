<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>批量操作 | 学习平台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <header class="hero mini">
      <div class="hero-left">
        <p class="eyebrow">学习平台 · 管理员端</p>
        <h1>批量操作</h1>
        <p class="sub">批量修改用户角色与状态。</p>
      </div>
      <div class="hero-actions">
        <a class="btn ghost" href="/admin.html">返回主页</a>
        <span id="admin-user" class="muted">-</span>
        <button id="btn-logout" class="btn ghost">退出</button>
        <a class="btn ghost" href="/login.html">返回登录</a>
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <div class="card-head">
          <h2>批量操作</h2>
        </div>
        <label>
          用户 ID 列表（逗号分隔）
          <input id="batch-user-ids" type="text" placeholder="例如 1,2,3" />
        </label>
        <div class="inline">
          <select id="batch-role">
            <option value="STUDENT">学生</option>
            <option value="TEACHER">教师</option>
            <option value="ADMIN">管理员</option>
          </select>
          <button id="btn-batch-role" class="btn ghost">批量改角色</button>
          <select id="batch-status">
            <option value="NORMAL">正常</option>
            <option value="BANNED">禁用</option>
          </select>
          <button id="btn-batch-status" class="btn ghost">批量改状态</button>
        </div>
        <p id="batch-message" class="message"></p>
      </section>
    </main>

    <script src="/common.js"></script>
    <script src="/admin.js"></script>
  </body>
</html>
