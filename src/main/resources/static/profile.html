<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>个人信息 | 学习平台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <header class="hero mini">
      <div class="hero-left">
        <p class="eyebrow">学习平台 · 个人中心</p>
        <h1>个人信息</h1>
        <p class="sub">查看并更新邮箱或密码。</p>
      </div>
      <div class="hero-actions">
        <a id="btn-home" class="btn ghost" href="/index.html">返回主页</a>
        <span id="profile-user" class="muted">-</span>
        <button id="btn-logout" class="btn ghost">退出</button>
        <a class="btn ghost" href="/login.html">返回登录</a>
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <div class="card-head">
          <h2>账号信息</h2>
        </div>
        <div id="profile-info" class="grid"></div>
      </section>

      <section class="card">
        <div class="card-head">
          <h2>更新信息</h2>
          <p class="muted">只填写需要修改的字段</p>
        </div>
        <label>
          上传头像
          <input id="profile-avatar-file" type="file" accept="image/*" />
        </label>
        <button id="btn-upload-avatar" class="btn ghost">上传头像</button>
        <label>
          新用户名
          <input id="profile-username" type="text" placeholder="4-16 位，修改后需要重新登录" />
        </label>
        <label>
          昵称
          <input id="profile-nickname" type="text" placeholder="请输入昵称" />
        </label>
        <label>
          手机号
          <input id="profile-phone" type="text" placeholder="请输入手机号" />
        </label>
        <label>
          头像链接
          <input id="profile-avatar" type="text" placeholder="https://..." />
        </label>
        <label>
          邮箱
          <input id="profile-email" type="email" placeholder="name@qq.com" />
        </label>
        <label>
          新密码
          <input id="profile-password" type="password" placeholder="至少 6 位" />
        </label>
        <label>
          确认新密码
          <input id="profile-password-confirm" type="password" placeholder="再次输入新密码" />
        </label>
        <button id="btn-update-profile" class="btn primary">保存修改</button>
        <p id="profile-message" class="message"></p>
      </section>
    </main>

    <script src="/common.js"></script>
    <script src="/profile.js"></script>
  </body>
</html>
