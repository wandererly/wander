<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>登录 | 学习平台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <header class="hero single">
      <div class="hero-left">
        <h1>登录</h1>
        <p class="sub">登录后将根据角色跳转到对应页面。</p>
      </div>
      <div class="hero-right">
        <div class="card auth-card">
          <div class="card-head">
            <h2>账号登录</h2>
            <div class="inline">
              <a class="muted" href="/register.html?role=STUDENT">学生注册</a>
              <a class="muted" href="/register.html?role=TEACHER">教师注册</a>
            </div>
          </div>
          <label>
            用户名
            <input id="login-username" type="text" placeholder="请输入用户名" />
          </label>
          <label>
            密码
            <input id="login-password" type="password" placeholder="请输入密码" />
          </label>
          <button id="btn-login" class="btn primary full">登录</button>
          <p id="login-message" class="message"></p>
          <a class="muted tiny" href="/index.html">返回首页</a>
        </div>
      </div>
    </header>
    <script src="/common.js"></script>
    <script src="/login.js"></script>
  </body>
</html>
