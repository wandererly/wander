<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>教师端 | 学习平台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <header class="hero mini">
      <div class="hero-left">
        <p class="eyebrow">学习平台 · 教师端</p>
        <h1>教师主页</h1>
        <p class="sub">从这里进入课程管理、通知与角色申请等功能。</p>
      </div>
      <div class="hero-actions">
        <span id="teacher-user" class="muted">-</span>
        <button id="btn-logout" class="btn ghost">退出</button>
        <a class="btn ghost" href="/profile.html">个人信息</a>
        <a class="btn ghost" href="/login.html">返回登录</a>
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <div class="card-head">
          <h2>功能入口</h2>
          <p class="muted">选择你要进入的页面</p>
        </div>
        <div class="grid nav-grid">
          <a class="course-item link-card" href="/teacher-notifications.html">
            <h3>通知中心</h3>
            <p class="muted">查看系统通知与审批结果</p>
          </a>
          <a class="course-item link-card" href="/teacher-role.html">
            <h3>角色申请</h3>
            <p class="muted">提交角色变更申请</p>
          </a>
          <a class="course-item link-card" href="/teacher-course-manage.html">
            <h3>课程管理</h3>
            <p class="muted">创建课程、更新章节、上下架</p>
          </a>
          <a class="course-item link-card" href="/teacher-section-manage.html">
            <h3>章节列表管理</h3>
            <p class="muted">列表式编辑与排序章节</p>
          </a>
          <a class="course-item link-card" href="/teacher-my-courses.html">
            <h3>我的课程</h3>
            <p class="muted">查看自己发布的课程</p>
          </a>
        </div>
      </section>
    </main>

    <script src="/common.js"></script>
    <script src="/teacher.js"></script>
  </body>
</html>
