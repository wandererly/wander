<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>课程管理 | 学习平台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <header class="hero mini">
      <div class="hero-left">
        <p class="eyebrow">学习平台 · 教师端</p>
        <h1>课程管理</h1>
        <p class="sub">按步骤完成：创建课程 → 课程更新/下架 → 章节管理。</p>
      </div>
      <div class="hero-actions">
        <a class="btn ghost" href="/teacher.html">返回主页</a>
        <span id="teacher-user" class="muted">-</span>
        <button id="btn-logout" class="btn ghost">退出</button>
        <a class="btn ghost" href="/login.html">返回登录</a>
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <div class="card-head">
          <h2>操作导航</h2>
          <div class="inline">
            <a class="btn ghost" href="/teacher-my-courses.html">我的课程列表</a>
            <a class="btn ghost" href="/teacher-notifications.html">通知中心</a>
            <a class="btn ghost" href="/teacher-section-manage.html">章节列表管理</a>
          </div>
        </div>
        <p class="muted tiny">提示：先到“我的课程列表”获取课程 ID，再回到此页进行更新或章节管理。</p>
      </section>

      <section class="card">
        <div class="card-head">
          <h2>快速选择课程</h2>
          <div class="inline">
            <button id="btn-load-courses" class="btn ghost">加载我的课程</button>
            <a class="btn ghost" href="/teacher-my-courses.html">从课程列表选择</a>
          </div>
        </div>
        <label>
          选择课程
          <select id="teacher-course-select">
            <option value="">请选择课程</option>
          </select>
        </label>
        <p id="selected-course-info" class="muted tiny">未选择课程</p>
      </section>

      <section class="card">
        <div class="card-head">
          <h2>快速选择章节</h2>
          <div class="inline">
            <a class="btn ghost" href="/teacher-course-preview.html" target="_blank">预览章节</a>
          </div>
        </div>
        <label>
          选择章节
          <select id="teacher-section-select">
            <option value="">请先选择课程</option>
          </select>
        </label>
        <p id="selected-section-info" class="muted tiny">未选择章节</p>
      </section>

      <section class="card">
        <div class="card-head">
          <h2>课程管理</h2>
          <div class="inline">
            <button id="btn-refresh-courses" class="btn ghost">刷新课程</button>
          </div>
        </div>
        <div class="teacher-grid">
          <div class="teacher-block">
            <h3>步骤 1：创建课程</h3>
            <label>
              课程标题
              <input id="teacher-course-title" type="text" placeholder="例如：Java 基础入门" />
            </label>
            <label>
              课程简介
              <input id="teacher-course-desc" type="text" placeholder="一句话说明课程内容" />
            </label>
            <button id="btn-create-course" class="btn primary full">创建课程</button>
          </div>
          <div class="teacher-block">
            <h3>步骤 2：更新/下架/删除</h3>
            <label>
              课程 ID
              <input id="teacher-course-id" type="number" placeholder="从课程列表中复制" />
            </label>
            <label>
              新标题（可选）
              <input id="teacher-course-new-title" type="text" placeholder="留空则不改" />
            </label>
            <label>
              新简介（可选）
              <input id="teacher-course-new-desc" type="text" placeholder="留空则不改" />
            </label>
            <label>
              状态（可选）
              <select id="teacher-course-status">
                <option value="">不修改</option>
                <option value="PUBLISHED">已发布</option>
                <option value="DRAFT">草稿</option>
                <option value="OFFLINE">已下架</option>
              </select>
            </label>
            <div class="inline">
              <button id="btn-update-course" class="btn ghost">更新课程</button>
              <button id="btn-offline-course" class="btn ghost">下架课程</button>
              <button id="btn-delete-course" class="btn danger">删除课程</button>
            </div>
          </div>
          <div class="teacher-block">
            <h3>步骤 3：章节管理</h3>
            <label>
              课程 ID
              <input id="teacher-section-course-id" type="number" placeholder="从课程列表中复制" />
            </label>
            <label>
              章节标题
              <input id="teacher-section-title" type="text" placeholder="例如：第 1 章 入门" />
            </label>
            <label>
              顺序
              <input id="teacher-section-order" type="number" placeholder="例如 1" />
            </label>
            <label>
              内容链接
              <input id="teacher-section-url" type="text" placeholder="https://..." />
            </label>
            <label>
              章节 ID（更新/删除用）
              <input id="teacher-section-id" type="number" placeholder="从章节列表获取" />
            </label>
            <div class="inline">
              <button id="btn-create-section" class="btn primary">新增章节</button>
              <button id="btn-update-section" class="btn ghost">更新章节</button>
              <button id="btn-delete-section" class="btn danger">删除章节</button>
            </div>
          </div>
        </div>
        <p id="teacher-message" class="message"></p>
      </section>
    </main>

    <script src="/common.js"></script>
    <script src="/teacher.js"></script>
  </body>
</html>
